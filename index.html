<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Grammar Catcher 🥐</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(135deg, #2b1a0e 0%, #1a0f08 100%);
    display:flex; align-items:center; justify-content:center;
    height:100vh; overflow:hidden;
    font-family:'Nunito',sans-serif;
    user-select:none;
    touch-action: none;
  }
  #gameCanvas {
    display:block;
    border-radius:18px;
    box-shadow:0 10px 60px rgba(0,0,0,0.6), 0 0 0 8px rgba(200,130,60,0.15);
    touch-action:none;
    cursor: pointer;
    max-width: 100vw;
    max-height: 100vh;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ========== ИСПРАВЛЕНО: БОЛЕЕ ШИРОКОЕ ПОЛЕ ==========
const W = 560, H = 640;  // Было 480, стало 560 (+80 пикселей)
canvas.width = W; canvas.height = H;

const CONFIG = {
  basketWidth: 120,      // Чуть шире корзина под новое поле
  basketHeight: 50,
  basketY: H - 90,
  catchY: H - 85,
  maxWords: 6,           // Больше слов на широком поле
  spawnInterval: 1050,
  baseSpeed: 1.7,
  levelTime: 60,
  targetScore: 10,
  switchScore: 5
};

const MODES = [
  { 
    subject: "🥐  She  ___", 
    hint: 'Catch verbs with -s / -es',
    correct: ['likes','plays','watches','goes','studies','reads','runs','dances','sings','teaches','fixes','tries'],
    wrong: ['like', 'play', 'watch', 'go', 'study', 'read', 'run', 'dance', 'sing', 'teach', 'fix', 'try'],
    color: '#e07b39'
  },
  { 
    subject: "🥐  We  ___", 
    hint: 'Catch base form (NO -s)',
    correct: ['like', 'play', 'watch', 'go', 'study', 'read', 'run', 'dance', 'sing', 'teach', 'fix', 'try'],
    wrong: ['likes','plays','watches','goes','studies','reads','runs','dances','sings','teaches','fixes','tries'],
    color: '#c0392b'
  },
  { 
    subject: "🥐  He  ___", 
    hint: 'Catch verbs with -s / -es',
    correct: ['likes','plays','watches','goes','studies','reads','runs','dances','sings','teaches','fixes','tries'],
    wrong: ['like', 'play', 'watch', 'go', 'study', 'read', 'run', 'dance', 'sing', 'teach', 'fix', 'try'],
    color: '#e07b39'
  },
  { 
    subject: "🥐  They  ___", 
    hint: 'Catch base form (NO -s)',
    correct: ['like', 'play', 'watch', 'go', 'study', 'read', 'run', 'dance', 'sing', 'teach', 'fix', 'try'],
    wrong: ['likes','plays','watches','goes','studies','reads','runs','dances','sings','teaches','fixes','tries'],
    color: '#c0392b'
  }
];

let state = 'START';
let currentMode = 0;
let lives = 3;
let score = 0;
let caught = 0;
let streak = 0;
let bestStreak = 0;
let totalOk = 0;
let totalBad = 0;
let timer = 60;
let basketX = W/2 - CONFIG.basketWidth/2;
let mouseX = W/2;
let keyLeft = false;
let keyRight = false;
let words = [];
let pool = [];
let poolIndex = 0;
let timerInterval = null;
let spawnInterval = null;
let rafId = null;
let flashTimer = 0;
let shakeTimer = 0;
let particles = [];
let floats = [];
let countdownNum = 3;
let savedStats = {};
let buttons = {};
let lastTime = 0;
let lastSwitchScore = 0;

const bakerImg = new Image();
bakerImg.src = 'baker.png';
let bakerImgLoaded = false;
bakerImg.onload = () => { bakerImgLoaded = true; };

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H, 1);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}

function getCurrentMode() {
  return MODES[currentMode];
}

function switchMode() {
  currentMode = (currentMode + 1) % MODES.length;
  lastSwitchScore = score;
  pool = [];
  poolIndex = 0;
}

function buildWordPool() {
  const mode = getCurrentMode();
  const correct = shuffle([...mode.correct]);
  const wrong = shuffle([...mode.wrong]);
  const pool = [];
  
  for (let i = 0; i < 9; i++) {
    pool.push({ text: correct[i % correct.length], ok: true });
  }
  for (let i = 0; i < 6; i++) {
    pool.push({ text: wrong[i % wrong.length], ok: false });
  }
  
  return shuffle(pool);
}

function getNextWord() {
  if (poolIndex >= pool.length) {
    pool = buildWordPool();
    poolIndex = 0;
  }
  return pool[poolIndex++];
}

function measureTextWidth(text) {
  ctx.font = 'bold 15px Nunito,sans-serif';
  return ctx.measureText(text).width + 36;
}

function spawnWord() {
  if (words.length >= CONFIG.maxWords) return;
  
  const item = getNextWord();
  const width = measureTextWidth(item.text);
  const x = 12 + Math.random() * (W - width - 24);
  const speed = CONFIG.baseSpeed + Math.random() * 0.8;
  
  words.push({
    text: item.text,
    ok: item.ok,
    x: x,
    y: -50,
    w: width,
    h: 42,
    speed: speed,
    angle: 0,
    spin: (Math.random() - 0.5) * 0.03
  });
}

function drawBackground() {
  const wallGradient = ctx.createLinearGradient(0, 0, 0, H);
  wallGradient.addColorStop(0, '#3b2010');
  wallGradient.addColorStop(0.55, '#4a2a14');
  wallGradient.addColorStop(1, '#2d1a0a');
  ctx.fillStyle = wallGradient;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.globalAlpha = 0.18;
  const brickW = 52, brickH = 22;
  for (let row = 0; row < Math.ceil(H / brickH) + 1; row++) {
    const offset = row % 2 === 0 ? 0 : brickW / 2;
    ctx.fillStyle = '#c87941';
    for (let col = -1; col < Math.ceil(W / brickW) + 1; col++) {
      const bx = col * brickW + offset;
      const by = row * brickH;
      ctx.fillRect(bx + 1, by + 1, brickW - 2, brickH - 2);
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  drawOvenWindow();
  drawShelf(10, 220, 120);
  drawShelf(W - 130, 220, 120);  // Адаптировано под ширину
  drawBreadItem(22, 207, '🍞');
  drawBreadItem(64, 207, '🥖');
  drawBreadItem(W - 98, 207, '🧁');
  drawBreadItem(W - 56, 207, '🍰');
  drawCounter();
  drawLight(100, 0, 160);
  drawLight(W/2, 0, 155);
  drawLight(W - 100, 0, 162);
  drawSign();
}

function drawOvenWindow() {
  ctx.save();
  ctx.shadowColor = '#f59a23';
  ctx.shadowBlur = 40;
  
  const archX = W/2 - 70, archW = 140, archH = 120;
  const archY = 80;
  
  ctx.fillStyle = '#ffeaa0';
  ctx.beginPath();
  ctx.arc(W/2, archY + archH/2, archW/2, Math.PI, 0);
  ctx.rect(archX, archY + archH/2, archW, archH/2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  ctx.fillStyle = '#c0392b';
  ctx.fillRect(archX - 5, archY, 18, archH + 5);
  ctx.fillRect(archX + archW - 13, archY, 18, archH + 5);
  ctx.restore();

  const glow = ctx.createRadialGradient(W/2, archY + archH, 5, W/2, archY + archH, 200);
  glow.addColorStop(0, 'rgba(255,200,80,0.22)');
  glow.addColorStop(1, 'rgba(255,200,80,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);
}

function drawShelf(x, y, w) {
  ctx.fillStyle = '#5a2d0c';
  ctx.fillRect(x, y, w, 12);
  ctx.fillStyle = 'rgba(255,200,100,.13)';
  ctx.fillRect(x, y, w, 3);
  
  ctx.fillStyle = '#4a2408';
  ctx.fillRect(x + 6, y, 8, 22);
  ctx.fillRect(x + w - 14, y, 8, 22);
}

function drawBreadItem(x, y, emoji) {
  ctx.font = '26px serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,.3)';
  ctx.shadowBlur = 4;
  ctx.fillText(emoji, x, y);
  ctx.shadowBlur = 0;
}

function drawLight(x, y, len) {
  ctx.strokeStyle = '#4a2408';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, len);
  ctx.stroke();
  
  ctx.save();
  ctx.shadowColor = '#fff3a0';
  ctx.shadowBlur = 22;
  ctx.fillStyle = '#fff9c4';
  ctx.beginPath();
  ctx.arc(x, len, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  const coneH = 60;
  const cone = ctx.createRadialGradient(x, len, 2, x, len, coneH);
  cone.addColorStop(0, 'rgba(255,240,160,0.28)');
  cone.addColorStop(1, 'rgba(255,240,160,0)');
  ctx.fillStyle = cone;
  ctx.beginPath();
  ctx.moveTo(x, len);
  ctx.arc(x, len, coneH, 0.45 * Math.PI, 0.55 * Math.PI);
  ctx.fill();
  ctx.restore();
}

function drawCounter() {
  ctx.fillStyle = '#6b3a1f';
  ctx.fillRect(0, H - 90, W, 90);
  
  const cTop = ctx.createLinearGradient(0, H - 90, 0, H - 74);
  cTop.addColorStop(0, '#a0531e');
  cTop.addColorStop(1, '#6b3a1f');
  ctx.fillStyle = cTop;
  ctx.fillRect(0, H - 90, W, 16);
  
  ctx.fillStyle = 'rgba(255,200,100,.18)';
  ctx.fillRect(0, H - 91, W, 3);
  
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#f5c57a';
  for (let c = 0; c < W; c += 40) {
    for (let r = H - 88; r < H; r += 38) {
      ctx.fillRect(c + 1, r + 1, 38, 36);
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawSign() {
  ctx.save();
  ctx.fillStyle = 'rgba(60,20,0,0.7)';
  roundRect(ctx, W/2 - 90, 16, 180, 32, 8);
  ctx.fill();
  
  ctx.strokeStyle = '#f5a623';
  ctx.lineWidth = 2;
  roundRect(ctx, W/2 - 90, 16, 180, 32, 8);
  ctx.stroke();
  
  ctx.font = 'bold 15px "Fredoka One",cursive';
  ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#f59a23';
  ctx.shadowBlur = 8;
  ctx.fillText('🥐  Grammar Bakery  🥐', W/2, 37);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';
  ctx.restore();
}

// ========== ИСПРАВЛЕНО: КРУАССАНЫ ЧУТЬ МЕНЬШЕ ==========
function drawCroissantWord(word) {
  ctx.save();
  const cx = word.x + word.w / 2;
  const cy = word.y + word.h / 2;
  ctx.translate(cx, cy);
  ctx.rotate(word.angle);

  ctx.shadowColor = 'rgba(0,0,0,.35)';
  ctx.shadowBlur = 8;

  const cg = ctx.createLinearGradient(-word.w/2, -word.h/2, word.w/2, word.h/2);
  cg.addColorStop(0, '#f5c842');
  cg.addColorStop(0.4, '#e8a020');
  cg.addColorStop(1, '#c47a15');
  ctx.fillStyle = cg;
  ctx.beginPath();
  // Уменьшили размер круассана (было word.w/2, word.h/2)
  ctx.ellipse(0, 0, word.w/2 - 3, word.h/2 - 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#d4860e';
  ctx.beginPath();
  ctx.ellipse(-word.w/2 + 8, 0, 8, word.h/2 - 5, 0.3, 0, Math.PI * 2);  // Чуть меньше
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(word.w/2 - 8, 0, 8, word.h/2 - 5, -0.3, 0, Math.PI * 2);  // Чуть меньше
  ctx.fill();

  ctx.fillStyle = 'rgba(255,230,100,.35)';
  ctx.beginPath();
  ctx.ellipse(-word.w/8, -word.h/5, word.w/6, word.h/7, -0.3, 0, Math.PI * 2);  // Чуть меньше
  ctx.fill();

  ctx.strokeStyle = 'rgba(150,70,0,.4)';
  ctx.lineWidth = 1;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(i * word.w/6 - 6, -word.h/3);
    ctx.lineTo(i * word.w/6 + 6, word.h/3);
    ctx.stroke();
  }

  ctx.font = 'bold 14px Nunito,sans-serif';  // Чуть меньше шрифт (было 15px)
  ctx.fillStyle = '#3b1a00';
  ctx.shadowColor = 'rgba(255,200,80,.6)';
  ctx.shadowBlur = 4;
  ctx.textAlign = 'center';
  ctx.fillText(word.text, 0, 5);
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawBasket() {
  const x = basketX;
  const y = CONFIG.basketY;
  const bob = Math.sin(Date.now() * 0.005) * 3;

  ctx.save();
  ctx.translate(x + CONFIG.basketWidth/2, y - 20 + bob);
  ctx.scale(0.85, 0.85);
  
  if (bakerImgLoaded) {
    ctx.drawImage(bakerImg, -60, -110, 120, 120);
  } else {
    drawFallbackBaker(0, 0);
  }
  ctx.restore();

  ctx.save();
  ctx.translate(x, y);
  
  ctx.strokeStyle = '#fdbf60';
  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(15, -10);
  ctx.lineTo(20, 15);
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(CONFIG.basketWidth - 15, -10);
  ctx.lineTo(CONFIG.basketWidth - 20, 15);
  ctx.stroke();
  
  ctx.fillStyle = '#fdbf60';
  ctx.beginPath();
  ctx.arc(20, 15, 7, 0, Math.PI * 2);
  ctx.arc(CONFIG.basketWidth - 20, 15, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(x, y);
  
  ctx.beginPath();
  ctx.moveTo(5, 0);
  ctx.lineTo(CONFIG.basketWidth - 5, 0);
  ctx.lineTo(CONFIG.basketWidth - 12, CONFIG.basketHeight);
  ctx.lineTo(12, CONFIG.basketHeight);
  ctx.closePath();
  
  const bg = ctx.createLinearGradient(0, 0, 0, CONFIG.basketHeight);
  bg.addColorStop(0, '#c87941');
  bg.addColorStop(1, '#8b4513');
  ctx.fillStyle = bg;
  ctx.shadowColor = 'rgba(0,0,0,.3)';
  ctx.shadowBlur = 8;
  ctx.fill();
  ctx.shadowBlur = 0;
  
  ctx.strokeStyle = 'rgba(0,0,0,.18)';
  ctx.lineWidth = 1;
  for (let i = 8; i < CONFIG.basketWidth - 8; i += 8) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i + 2, CONFIG.basketHeight);
    ctx.stroke();
  }
  for (let j = 8; j < CONFIG.basketHeight; j += 7) {
    ctx.beginPath();
    ctx.moveTo(8, j);
    ctx.lineTo(CONFIG.basketWidth - 8, j + 2);
    ctx.stroke();
  }
  ctx.restore();

  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(CONFIG.basketWidth/2, 8, 30, Math.PI, 0);
  ctx.stroke();
  
  ctx.strokeStyle = '#c87941';
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.arc(CONFIG.basketWidth/2, 8, 30, Math.PI, 0);
  ctx.stroke();
  ctx.restore();

  const mode = getCurrentMode();
  ctx.font = 'bold 11px "Fredoka One",cursive';
  const label = mode.subject;
  
  ctx.fillStyle = 'rgba(255,240,200,.98)';
  ctx.textAlign = 'center';
  ctx.fillText(label, x + CONFIG.basketWidth/2, y + CONFIG.basketHeight/2 + 5);
  ctx.textAlign = 'left';
}

function drawFallbackBaker(x, y) {
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(x, y - 20, 45, 50, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#fdbf60';
  ctx.beginPath();
  ctx.arc(x, y - 75, 30, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x, y - 100, 35, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(x - 25, y - 105, 50, 20);
  
  ctx.strokeStyle = '#8b4513';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x, y - 70, 15, 0.2, Math.PI - 0.2);
  ctx.stroke();
  
  ctx.fillStyle = '#654321';
  ctx.beginPath();
  ctx.ellipse(x - 12, y - 68, 10, 4, -0.2, 0, Math.PI * 2);
  ctx.ellipse(x + 12, y - 68, 10, 4, 0.2, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x - 12, y - 82, 4, 0, Math.PI * 2);
  ctx.arc(x + 12, y - 82, 4, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 30, y - 40, 60, 50);
  ctx.strokeStyle = '#c87941';
  ctx.lineWidth = 2;
  ctx.strokeRect(x - 30, y - 40, 60, 50);
}

function drawHUD() {
  ctx.fillStyle = 'rgba(30,10,0,.65)';
  ctx.fillRect(0, 0, W, 48);
  ctx.strokeStyle = 'rgba(200,120,40,.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, 48);
  ctx.lineTo(W, 48);
  ctx.stroke();

  ctx.font = '20px serif';
  for (let i = 0; i < 3; i++) {
    ctx.globalAlpha = i < lives ? 1 : 0.22;
    ctx.fillText('❤️', 8 + i * 26, 32);
  }
  ctx.globalAlpha = 1;

  ctx.font = 'bold 16px "Fredoka One",cursive';
  ctx.shadowColor = 'rgba(0,0,0,.6)';
  ctx.shadowBlur = 4;
  ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'center';
  ctx.fillText('⭐ ' + score, W/2, 30);
  
  ctx.textAlign = 'right';
  ctx.fillStyle = timer <= 10 ? '#ff6b6b' : '#ffd700';
  ctx.fillText('⏱ ' + timer, W - 56, 30);
  ctx.fillStyle = '#ffd700';
  ctx.fillText('🥐 ' + caught + '/10', W - 1, 30);
  ctx.textAlign = 'left';
  ctx.shadowBlur = 0;

  const nextSwitch = lastSwitchScore + CONFIG.switchScore;
  const progress = Math.min(1, (score - lastSwitchScore) / CONFIG.switchScore);
  
  ctx.fillStyle = 'rgba(255,255,255,.15)';
  roundRect(ctx, 14, 73, W - 28, 7, 4);
  ctx.fill();
  
  const pg = ctx.createLinearGradient(14, 0, 14 + (W - 28) * progress, 0);
  pg.addColorStop(0, getCurrentMode().color);
  pg.addColorStop(1, MODES[(currentMode + 1) % MODES.length].color);
  roundRect(ctx, 14, 73, (W - 28) * progress, 7, 4);
  ctx.fillStyle = pg;
  ctx.fill();
  
  ctx.font = 'bold 10px Nunito,sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  ctx.textAlign = 'center';
  ctx.fillText(`Next: ${nextSwitch} pts`, W/2, 72);
  ctx.textAlign = 'left';

  if (streak >= 2) {
    ctx.font = 'bold 13px "Fredoka One",cursive';
    const sw = ctx.measureText('🔥 x' + streak).width + 18;
    ctx.fillStyle = '#e07b39';
    roundRect(ctx, W - sw - 8, 82, sw, 20, 10);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'right';
    ctx.fillText('🔥 x' + streak, W - 10, 96);
    ctx.textAlign = 'left';
  }
}

function burst(x, y, color) {
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2.5 + Math.random() * 5;
    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      r: 3 + Math.random() * 5,
      alpha: 1,
      color: color
    });
  }
}

function addFloat(text, color, x, y) {
  floats.push({ text, color, x, y, vy: -1.8, alpha: 1 });
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.18;
    p.alpha -= 0.028;
    p.r *= 0.97;
  });
  particles = particles.filter(p => p.alpha > 0);
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function updateFloats() {
  floats.forEach(f => {
    f.y += f.vy;
    f.alpha -= 0.024;
  });
  floats = floats.filter(f => f.alpha > 0);
}

function drawFloats() {
  floats.forEach(f => {
    ctx.globalAlpha = f.alpha;
    ctx.font = 'bold 22px "Fredoka One",cursive';
    ctx.shadowColor = 'rgba(0,0,0,.4)';
    ctx.shadowBlur = 4;
    ctx.fillStyle = f.color;
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';
}

function drawButton(x, y, w, h, label, c1, c2, textColor, id) {
  const g = ctx.createLinearGradient(x, y, x + w, y + h);
  g.addColorStop(0, c1);
  g.addColorStop(1, c2);
  
  ctx.shadowColor = 'rgba(0,0,0,.4)';
  ctx.shadowBlur = 10;
  roundRect(ctx, x, y, w, h, h/2);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.shadowBlur = 0;
  
  ctx.font = 'bold 18px "Fredoka One",cursive';
  ctx.fillStyle = textColor;
  ctx.textAlign = 'center';
  ctx.fillText(label, x + w/2, y + h/2 + 6);
  ctx.textAlign = 'left';
  
  if (id) buttons[id] = { x, y, w, h };
}

function drawStatBox(stats) {
  const sx = 44, sy = 218, sw = W - 88;
  const rows = Object.entries(stats).filter(([,v]) => v !== '');
  const sh = rows.length * 46 + 16;
  
  ctx.fillStyle = 'rgba(255,230,180,.12)';
  roundRect(ctx, sx, sy, sw, sh, 16);
  ctx.fill();
  
  ctx.strokeStyle = 'rgba(200,140,40,.3)';
  ctx.lineWidth = 1.5;
  roundRect(ctx, sx, sy, sw, sh, 16);
  ctx.stroke();
  
  let iy = sy + 40;
  rows.forEach(([k, v]) => {
    ctx.font = 'bold 14px Nunito,sans-serif';
    ctx.fillStyle = 'rgba(255,220,160,.8)';
    ctx.textAlign = 'left';
    ctx.fillText(k, sx + 18, iy);
    
    ctx.font = 'bold 20px "Fredoka One",cursive';
    ctx.fillStyle = '#ffd700';
    ctx.textAlign = 'right';
    ctx.fillText(v, sx + sw - 18, iy);
    
    ctx.strokeStyle = 'rgba(200,140,40,.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sx + 14, iy + 8);
    ctx.lineTo(sx + sw - 14, iy + 8);
    ctx.stroke();
    
    iy += 46;
  });
  ctx.textAlign = 'left';
}

function drawStartScreen() {
  ctx.fillStyle = 'rgba(15,8,4,.92)';
  ctx.fillRect(0, 0, W, H);
  
  const gradient = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, 400);
  gradient.addColorStop(0, 'rgba(200,130,60,.08)');
  gradient.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  ctx.font = 'bold 48px "Fredoka One",cursive';
  ctx.fillStyle = '#d4a574';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,.5)';
  ctx.shadowBlur = 10;
  ctx.fillText('Grammar Bakery', W/2, 120);
  ctx.shadowBlur = 0;
  
  ctx.font = '16px Nunito,sans-serif';
  ctx.fillStyle = 'rgba(212,165,116,.6)';
  ctx.fillText('Catch the croissants', W/2, 150);

  ctx.strokeStyle = 'rgba(212,165,116,.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2 - 100, 175);
  ctx.lineTo(W/2 + 100, 175);
  ctx.stroke();

  ctx.font = '13px Nunito,sans-serif';
  ctx.fillStyle = 'rgba(255,230,200,.8)';
  ctx.textAlign = 'center';
  ctx.fillText('Modes alternate every 5 points!', W/2, 210);
  ctx.fillText('She/He/It (-s) ↔ We/They/I (base)', W/2, 235);
  ctx.textAlign = 'left';

  ctx.save();
  ctx.fillStyle = 'rgba(224,123,57,.9)';
  roundRect(ctx, W/2 - 100, 450, 200, 50, 25);
  ctx.fill();
  
  ctx.font = 'bold 18px "Fredoka One",cursive';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('▶ PLAY', W/2, 482);
  ctx.restore();
  
  buttons['PLAY'] = { x: W/2 - 100, y: 450, w: 200, h: 50 };

  ctx.textAlign = 'left';
}

function drawCountdownScreen() {
  ctx.fillStyle = 'rgba(20,8,2,.78)';
  ctx.fillRect(0, 0, W, H);
  
  ctx.font = '110px "Fredoka One",cursive';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#f5a623';
  ctx.shadowBlur = 40;
  ctx.fillStyle = '#ffd700';
  ctx.fillText(countdownNum === 0 ? 'GO!' : countdownNum, W/2, H/2 + 20);
  ctx.shadowBlur = 0;
  
  const mode = getCurrentMode();
  ctx.font = 'bold 19px "Fredoka One",cursive';
  ctx.fillStyle = mode.color;
  ctx.fillText(mode.hint, W/2, H/2 + 75);
  ctx.textAlign = 'left';
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(30,5,5,.88)';
  ctx.fillRect(0, 0, W, H);
  
  ctx.font = '62px serif';
  ctx.textAlign = 'center';
  ctx.fillText('😢', W/2, 110);
  
  ctx.font = 'bold 48px "Fredoka One",cursive';
  ctx.fillStyle = '#ff6b6b';
  ctx.shadowColor = '#0008';
  ctx.shadowBlur = 10;
  ctx.fillText('Game Over', W/2, 170);
  ctx.shadowBlur = 0;
  
  drawStatBox(savedStats);
  drawButton(W/2 - 110, 490, 220, 50, '🔄  Try Again', '#e07b39', '#c0392b', '#fff', 'RETRY');
  drawButton(W/2 - 65, 552, 130, 44, '🏠  Menu', 'rgba(255,200,100,.2)', 'rgba(255,200,100,.2)', '#ffd700', 'MENU');
  ctx.textAlign = 'left';
}

function drawWinScreen() {
  ctx.fillStyle = 'rgba(5,20,5,.88)';
  ctx.fillRect(0, 0, W, H);
  
  ctx.font = '62px serif';
  ctx.textAlign = 'center';
  ctx.fillText('🏆', W/2, 100);
  
  ctx.font = 'bold 40px "Fredoka One",cursive';
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#0008';
  ctx.shadowBlur = 10;
  ctx.fillText('You are a', W/2, 158);
  ctx.fillText('Grammar Master!', W/2, 204);
  ctx.shadowBlur = 0;
  
  ctx.font = '28px serif';
  ctx.fillText('🥐 🥐 ', W/2, 235);
  
  drawStatBox(savedStats);
  drawButton(W/2 - 110, 495, 220, 50, '🎮  Play Again', '#e07b39', '#c0392b', '#fff', 'RETRY');
  drawButton(W/2 - 60, 555, 120, 42, '🏠 Menu', 'rgba(255,200,100,.2)', 'rgba(255,200,100,.2)', '#ffd700', 'MENU');
  ctx.textAlign = 'left';
}

function onCatch(word) {
  const fx = basketX + CONFIG.basketWidth/2;
  const fy = CONFIG.catchY - 30;
  
  if (word.ok) {
    score += 10;
    caught++;
    streak++;
    totalOk++;
    
    if (streak > bestStreak) bestStreak = streak;
    
    if (score >= lastSwitchScore + CONFIG.switchScore && score < 50) {
      switchMode();
      addFloat('MODE SWITCH!', '#ffd700', fx, fy - 30);
    }
    
    let msg = '+10 🥐';
    if (streak >= 5) {
      score += 20;
      msg = '🔥 +30!';
    }
    
    addFloat(msg, '#ffd700', fx, fy);
    burst(fx, CONFIG.catchY, '#ffd700');
    flashTimer = 12;
    
    if (caught >= CONFIG.targetScore) {
      clearIntervals();
      setTimeout(doWin, 250);
      return;
    }
  } else {
    score = Math.max(0, score - 5);
    streak = 0;
    lives--;
    totalBad++;
    
    addFloat('-5 ✗', '#ff6b6b', fx, fy);
    burst(fx, CONFIG.catchY, '#ff1744');
    flashTimer = -12;
    shakeTimer = 16;
    
    if (lives <= 0) {
      clearIntervals();
      setTimeout(() => doEnd('lives'), 250);
      return;
    }
  }
}

function clearIntervals() {
  if (timerInterval) clearInterval(timerInterval);
  if (spawnInterval) clearInterval(spawnInterval);
  timerInterval = null;
  spawnInterval = null;
}

function startGame() {
  currentMode = 0;
  score = 0;
  caught = 0;
  streak = 0;
  bestStreak = 0;
  totalOk = 0;
  totalBad = 0;
  lastSwitchScore = 0;
  beginGame();
}

function beginGame() {
  lives = 3;
  timer = CONFIG.levelTime;
  basketX = W/2 - CONFIG.basketWidth/2;
  mouseX = W/2;
  words = [];
  particles = [];
  floats = [];
  flashTimer = 0;
  shakeTimer = 0;
  pool = buildWordPool();
  poolIndex = 0;
  
  clearIntervals();
  state = 'COUNTDOWN';
  countdownNum = 3;
  
  let n = 3;
  const iv = setInterval(() => {
    n--;
    countdownNum = n;
    if (n < 0) {
      clearInterval(iv);
      state = 'PLAY';
      
      timerInterval = setInterval(() => {
        if (state !== 'PLAY') return;
        timer--;
        if (timer <= 0) {
          clearIntervals();
          doEnd('time');
        }
      }, 1000);
      
      spawnInterval = setInterval(() => {
        if (state === 'PLAY') spawnWord();
      }, CONFIG.spawnInterval);
    }
  }, 850);
}

function getAccuracyPercent() {
  const total = totalOk + totalBad;
  return total ? Math.round(totalOk / total * 100) : 0;
}

function doEnd(reason) {
  state = 'GAMEOVER';
  const reasonText = reason === 'time' ? '⏰ Time\'s up!' : '💔 No lives!';
  savedStats = {
    [reasonText]: '',
    'Score': '⭐ ' + score,
    'Accuracy': getAccuracyPercent() + '%',
    'Best Streak': '🔥 ' + bestStreak,
    'Modes Completed': Math.floor(score / CONFIG.switchScore)
  };
}

function doWin() {
  state = 'WIN';
  savedStats = {
    'Total Score': '⭐ ' + score,
    'Accuracy': getAccuracyPercent() + '%',
    'Best Streak': '🔥 ' + bestStreak,
    'Correct Catches': '✅ ' + totalOk,
    'Modes Switched': Math.floor(score / CONFIG.switchScore)
  };
}

function showStart() {
  clearIntervals();
  state = 'START';
  words = [];
}

function hitTest(cx, cy, button) {
  return button && cx >= button.x && cx <= button.x + button.w && 
         cy >= button.y && cy <= button.y + button.h;
}

function handleClick(cx, cy) {
  if (state === 'START' && hitTest(cx, cy, buttons['PLAY'])) {
    startGame();
    return;
  }
  if (state === 'GAMEOVER') {
    if (hitTest(cx, cy, buttons['RETRY'])) {
      startGame();
      return;
    }
    if (hitTest(cx, cy, buttons['MENU'])) {
      showStart();
      return;
    }
  }
  if (state === 'WIN') {
    if (hitTest(cx, cy, buttons['RETRY'])) {
      startGame();
      return;
    }
    if (hitTest(cx, cy, buttons['MENU'])) {
      showStart();
      return;
    }
  }
}

function loop(timestamp) {
  rafId = requestAnimationFrame(loop);
  const dt = Math.min((timestamp - lastTime) / 16.67, 3);
  lastTime = timestamp;
  
  ctx.clearRect(0, 0, W, H);

  if (state === 'START') {
    drawBackground();
    drawStartScreen();
    return;
  }
  if (state === 'COUNTDOWN') {
    drawBackground();
    drawCountdownScreen();
    return;
  }
  if (state === 'GAMEOVER') {
    drawBackground();
    drawGameOverScreen();
    return;
  }
  if (state === 'WIN') {
    drawBackground();
    drawWinScreen();
    return;
  }

  ctx.save();
  if (shakeTimer > 0) {
    ctx.translate((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);
    shakeTimer--;
  }

  drawBackground();

  if (keyLeft) basketX = Math.max(0, basketX - 5 * dt);
  if (keyRight) basketX = Math.min(W - CONFIG.basketWidth - 2, basketX + 5 * dt);
  
  const targetX = Math.max(0, Math.min(W - CONFIG.basketWidth - 2, mouseX - CONFIG.basketWidth/2));
  basketX += (targetX - basketX) * 0.18 * dt;

  const catchLeft = basketX + 10;
  const catchRight = basketX + CONFIG.basketWidth - 10;
  const catchZone = CONFIG.catchY;

  for (let i = words.length - 1; i >= 0; i--) {
    const w = words[i];
    w.y += w.speed * dt;
    w.angle += w.spin;
    
    const midX = w.x + w.w / 2;
    const midY = w.y + w.h / 2;
    
    if (midY >= catchZone - 5 && midY <= catchZone + 15 && 
        midX >= catchLeft && midX <= catchRight) {
      words.splice(i, 1);
      onCatch(w);
    } else if (w.y > H + 20) {
      words.splice(i, 1);
    }
  }

  if (flashTimer > 0) flashTimer = Math.max(0, flashTimer - 0.6);
  if (flashTimer < 0) flashTimer = Math.min(0, flashTimer + 0.6);
  
  updateParticles();
  updateFloats();

  drawBasket();
  drawParticles();
  words.forEach(w => drawCroissantWord(w));
  drawFloats();
  drawHUD();

  ctx.restore();
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  handleClick(
    (e.clientX - rect.left) * (W / rect.width),
    (e.clientY - rect.top) * (H / rect.height)
  );
});

canvas.addEventListener('touchend', e => {
  const rect = canvas.getBoundingClientRect();
  const t = e.changedTouches[0];
  handleClick(
    (t.clientX - rect.left) * (W / rect.width),
    (t.clientY - rect.top) * (H / rect.height)
  );
});

window.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') keyLeft = true;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keyRight = true;
  if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) {
    e.preventDefault();
  }
});

window.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') keyLeft = false;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keyRight = false;
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
}, { passive: true });

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(loop);
</script>
</body>
